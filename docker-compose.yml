# ─────────────────────────────────────────────
#  Wallabot — Local Dev Stack (SQLite locally, Supabase optional)
#  Usage: docker-compose up --build
# ─────────────────────────────────────────────

services:

  # ── Auth Service ────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: wallabot-auth
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL:-sqlite:////app/data/auth.db}
      - AUTH_SEED_SAMPLE_DATA=true
      - SERVICE_NAME=auth-service
      - DB_SCHEMA=${DB_SCHEMA:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8001/auth/google/callback}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-}
      - FACEBOOK_REDIRECT_URI=${FACEBOOK_REDIRECT_URI:-http://localhost:8001/auth/facebook/callback}
      - FRONTEND_AUTH_CALLBACK_URL=${FRONTEND_AUTH_CALLBACK_URL:-http://localhost:5173/#/auth/callback}
    volumes:
      - wallabot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wallabot-net
    restart: unless-stopped

  # ── Inventory Service ────────────────────────
  inventory-service:
    build:
      context: ./backend/inventory-service
      dockerfile: Dockerfile
    container_name: wallabot-inventory
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${INVENTORY_DATABASE_URL:-sqlite:////app/data/inventory.db}
      - INVENTORY_UPLOAD_DIR=/app/data/uploads
      - SERVICE_NAME=inventory-service
    volumes:
      - wallabot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wallabot-net
    restart: unless-stopped

  # ── Transaction Service ──────────────────────
  transaction-service:
    build:
      context: ./backend/transaction-service
      dockerfile: Dockerfile
    container_name: wallabot-transactions
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${TRANSACTION_DATABASE_URL:-sqlite:////app/data/transactions.db}
      - SERVICE_NAME=transaction-service
    volumes:
      - wallabot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wallabot-net
    restart: unless-stopped

  # ── Agentic Service ──────────────────────
  agentic-service:
    build:
      context: ./backend/agentic-service
      dockerfile: Dockerfile
    container_name: wallabot-ai
    ports:
      - "8004:8000"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=agentic-service
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-wallabot}
    volumes:
      - wallabot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wallabot-net
    restart: unless-stopped
 #─ Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wallabot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - inventory-service
      - transaction-service
      - agentic-service
    environment:
      - WALLABOT_FRONTEND_DOCKER=true
      - VITE_APP_NAME=${VITE_APP_NAME:-Wallabot}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
      - VITE_API_AUTH_URL=http://localhost:8001
      - VITE_API_INVENTORY_URL=http://localhost:8002
      - VITE_API_TRANSACTION_URL=http://localhost:8003
      - VITE_API_WALLABOT_URL=http://localhost:8004
      - VITE_API_TIMEOUT_MS=${VITE_API_TIMEOUT_MS:-10000}
      - VITE_AUTH_TOKEN_STORAGE_KEY=${VITE_AUTH_TOKEN_STORAGE_KEY:-wallabot_auth_token}
      - VITE_WALLABOT_PRICE_ENABLED=${VITE_WALLABOT_PRICE_ENABLED:-true}
    networks:
      - wallabot-net
    restart: unless-stopped
# ─────────────────────────────────────────────
#  Shared Network
# ─────────────────────────────────────────────
networks:
  wallabot-net:
    driver: bridge

volumes:
  wallabot-data:

# ─────────────────────────────────────────────
#  NOTE: Supabase migration
#  When ready, replace DATABASE_URL with:
#    - DATABASE_URL=${SUPABASE_DB_URL}
#  and remove the local SQLite volume if it is no longer needed.
#  A docker-compose.prod.yml will override
#  these values without modifying this file.
# ─────────────────────────────────────────────
