name: Wallabot CI

on:
  push:
    branches: [main, develop, test]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened] 

# Cancel in-progress runs on the same branch
# when a newer commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  lint-backend:
    name: "Lint · backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .


  # ─────────────────────────────────────────────

  lint-frontend:
    name: "Lint · frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── One job per service, all run in parallel ─
  test-auth:
    name: "Test · auth-service"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/auth-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_auth.db"
          JWT_SECRET: "ci-test-secret"
          JWT_EXPIRY_MINUTES: "30"
        run: pytest --cov=app --cov-report=term-missing -q

  # ─────────────────────────────────────────────
  test-inventory:
    name: "Test · inventory-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/inventory-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/inventory-service/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_inventory.db"
          SECRET_KEY: "ci-test-secret"
          ALGORITHM: "HS256"
        run: pytest --cov=app --cov-report=term-missing -q

  # ─────────────────────────────────────────────

  test-transactions:
    name: "Test · transaction-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/transaction-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/transaction-service/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_transactions.db"
        run: pytest --cov=app --cov-report=term-missing -q

  # ─────────────────────────────────────────────

  test-wallabot:
    name: "Test · agentic-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/agentic-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/agentic-service/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_wallabot.db"
          TAVILY_API_KEY: "ci-mock-key"
          OPENAI_API_KEY: "ci-mock-key"
        run: pytest --cov=app --cov-report=term-missing -q

  test-backend-docker:
    name: "Test · backend (docker + live DB)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: python:3.11-slim
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wallabot
          POSTGRES_PASSWORD: wallabot
          POSTGRES_DB: wallabot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wallabot -d wallabot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install backend test dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl gcc libpq-dev
          rm -rf /var/lib/apt/lists/*
          python -m pip install --upgrade pip
          pip install -r backend/auth-service/requirements.txt
          pip install -r backend/inventory-service/requirements.txt
          pip install -r backend/transaction-service/requirements.txt
          pip install -r backend/agentic-service/requirements.txt

      - name: Run backend pytest suite
        env:
          DATABASE_URL: postgresql+psycopg2://wallabot:wallabot@postgres:5432/wallabot_test
          TEST_DATABASE_URL: postgresql+psycopg2://wallabot:wallabot@postgres:5432/wallabot_test
          JWT_SECRET: "ci-test-secret"
          JWT_EXPIRY_MINUTES: "30"
          SECRET_KEY: "ci-test-secret"
          ALGORITHM: "HS256"
          TAVILY_API_KEY: "ci-mock-key"
          OPENAI_API_KEY: "ci-mock-key"
        run: |
          pytest backend/auth-service/tests backend/inventory-service/tests backend/transaction-service/tests backend/agentic-service/test -q

  # ─────────────────────────────────────────────

  # Docker smoke test — only runs after ALL service
  # tests pass. Builds the full stack and hits /health
  # on each container to confirm startup is clean.
  docker-smoke:
    name: "Smoke · docker compose"
    runs-on: ubuntu-latest
    #TODO add lint-frontend as a dependency once it's implemented, to ensure we don't push images with lint errors
    needs: [test-auth, test-inventory, test-transactions, test-wallabot, test-backend-docker, lint-backend, lint-frontend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Write CI variables from secrets
        env:
          AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}
          INVENTORY_DATABASE_URL: ${{ secrets.INVENTORY_DATABASE_URL }}
          TRANSACTION_DATABASE_URL: ${{ secrets.TRANSACTION_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          for var in AUTH_DATABASE_URL INVENTORY_DATABASE_URL TRANSACTION_DATABASE_URL; do
            if [ -z "${!var}" ]; then
              echo "::error::$var must be configured in GitHub Actions secrets."
              exit 1
            fi
          done

          {
            printf '%s\n' \
              "SUPABASE_URL=${SUPABASE_URL}" \
              "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" \
              "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" \
              "AUTH_DATABASE_URL=${AUTH_DATABASE_URL}" \
              "INVENTORY_DATABASE_URL=${INVENTORY_DATABASE_URL}" \
              "TRANSACTION_DATABASE_URL=${TRANSACTION_DATABASE_URL}" \
              "TAVILY_API_KEY=${TAVILY_API_KEY}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "LANGCHAIN_TRACING_V2=false"
          } > .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          urls=(
            http://localhost:8001/health
            http://localhost:8002/health
            http://localhost:8003/health
            http://localhost:8004/health
          )

          for i in $(seq 1 60); do
            all_healthy=true

            for url in "${urls[@]}"; do
              if ! curl -sf "$url" >/dev/null; then
                all_healthy=false
                break
              fi
            done

            if [ "$all_healthy" = true ]; then
              exit 0
            fi

            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

          docker compose ps
          docker compose logs --no-color
          echo "Service never became healthy" && exit 1

      - name: Health checks
        run: |
          curl -f http://localhost:8001/health || (docker compose logs auth-service && exit 1)
          curl -f http://localhost:8003/health || (docker compose logs transaction-service && exit 1)

          curl -f http://localhost:8002/health || (docker compose logs inventory-service && exit 1)
          curl -f http://localhost:8004/health || (docker compose logs agentic-service && exit 1)
   
      - name: Tear down
        if: always()
        run: docker compose down -v
