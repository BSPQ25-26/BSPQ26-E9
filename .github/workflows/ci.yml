name: Wallabot CI

on:
  push:
    branches: [main, develop, test]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened] 

# Cancel in-progress runs on the same branch
# when a newer commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  lint-backend:
    name: "Lint · backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .
  # TODO
  #  NOTE FOR FRONTEND DEV/s: Frontend lint dependencies should be added in frontend/package.json
  #  devDependencies (eslint + any required plugins/config), with an eslint config file committed in frontend/.
  #lint-frontend:
  #  name: "Lint · frontend"
  #  runs-on: ubuntu-latest

  #  defaults:
  #    run:
  #      working-directory: frontend
  #  steps:
  #    - uses: actions/checkout@v4
  #    - uses: actions/setup-node@v4
  #      with:
  #        node-version: '20'
  #        cache: 'npm'
  #        cache-dependency-path: frontend/package-lock.json
  #    - name: Install dependencies
  #      run: npm ci
  #    - name: Install eslint
  #      run: npm install --no-save eslint
  #    - name: Run eslint
  #      run: npx --yes eslint src/

  # ── One job per service, all run in parallel ─
  test-auth:
    name: "Test · auth-service"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/auth-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_auth.db"
          JWT_SECRET: "ci-test-secret"
          JWT_EXPIRY_MINUTES: "30"
        run: pytest --cov=app --cov-report=term-missing -q

  # ─────────────────────────────────────────────
  test-inventory:
    name: "Test · inventory-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/inventory-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/inventory-service/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_inventory.db"
          SECRET_KEY: "ci-test-secret"
          ALGORITHM: "HS256"
        run: pytest --cov=app --cov-report=term-missing -q
  # ─────────────────────────────────────────────

  test-transactions:
    name: "Test · transaction-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/transaction-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/transaction-service/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_transactions.db"
        run: pytest --cov=app --cov-report=term-missing -q
  # ─────────────────────────────────────────────

  test-wallabot:
    name: "Test · agentic-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/agentic-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/agentic-service/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_wallabot.db"
          # Use a dummy key in CI — unit tests should mock the LLM calls
          TAVILY_API_KEY: "ci-mock-key"
          OPENAI_API_KEY: "ci-mock-key"
        run: pytest --cov=app --cov-report=term-missing -q

  # ─────────────────────────────────────────────

  # Docker smoke test — only runs after ALL service
  # tests pass. Builds the full stack and hits /health
  # on each container to confirm startup is clean.
  docker-smoke:
    name: "Smoke · docker compose"
    runs-on: ubuntu-latest
    #TODO add lint-frontend as a dependency once it's implemented, to ensure we don't push images with lint errors
    needs: [test-auth, test-inventory, test-transactions, test-wallabot, lint-backend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && \
            curl -sf http://localhost:8003/health && exit 0
            echo "Attempt $i — retrying in 3s..."
            sleep 3
          done
          echo "Service never became healthy" && exit 1

      - name: Health checks
        run: |
          curl -f http://localhost:8001/health || (docker compose logs auth-service && exit 1)
          curl -f http://localhost:8003/health || (docker compose logs transaction-service && exit 1)

          curl -f http://localhost:8002/health || (docker compose logs inventory-service && exit 1)
          curl -f http://localhost:8004/health || (docker compose logs wallabot-service && exit 1)
   
      - name: Tear down
        if: always()
        run: docker compose down -v
