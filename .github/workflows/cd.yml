name: Wallabot CD

on:
  # Only deploy when CI has passed on main
  workflow_run:
    workflows: ["Wallabot CI"]
    branches: [main, develop, test]
    types: [completed]

jobs:

  # ── Guard: skip everything if CI failed ─────
  check-ci:
    name: "Guard · CI passed"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — proceeding to deploy"

  # ── Build & push all images to GHCR ─────────
  build-and-push:
    name: "Build · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: check-ci
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.sha.outputs.sha }}

    strategy:
      matrix:
        service:
          - auth-service
          - inventory-service
          - transaction-service
          - agentic-service
          - frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub

      - name: Get correct SHA
        id: sha
        run: |
          echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_OUTPUT

      - name: Set image name
        id: meta
        run: |
          # ghcr.io/<owner>/<repo>/<service>:<sha>
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO}/${{ matrix.service }}" >> $GITHUB_OUTPUT

      # Determine the correct build context path
      - name: Resolve build context
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "context=./frontend" >> $GITHUB_OUTPUT
          else
            echo "context=./backend/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.sha.outputs.sha }} 
          # BuildKit cache: reuse layers across runs for faster builds
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to:   type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

  # ── Deploy ───────────────────────────────────



  deploy:
    name: "Deploy · production"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # enables manual approval in GitHub settings

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}


      # ── Option B: Placeholder until we migrate to supabase ────────────────
      - name: Deploy placeholder
        run: |
          echo "Images built and pushed to GHCR for commit ${{ needs.build-and-push.outputs.sha }}"
          echo "Actual deploy target to be configured in Sprint 2"
          echo ""
          echo "Images available:"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          for svc in auth-service transaction-service inventory-service wallabot-service frontend; do
            echo "  ghcr.io/${REPO}/${svc}:${{ needs.build-and-push.outputs.sha }}" 
          done

